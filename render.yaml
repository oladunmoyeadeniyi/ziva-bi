services:
  - type: web
    name: ziva-bi-backend
    runtime: python
    rootDir: backend
    region: oregon
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ziva-bi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ALLOWED_ORIGINS
        value: '["https://ziva-bi-frontend.onrender.com"]'
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

      # ── Supabase Storage (M6 — document attachments) ────────────────────────
      # Fill these in the Render dashboard after creating the Supabase project.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: documents

      # ── Email (P2 — Resend) ───────────────────────────────────────────────────
      # 1. Create a Resend account → https://resend.com
      # 2. Generate an API key and set it here (sync: false → enter in dashboard)
      # 3. Verify your sending domain and update EMAIL_FROM once the domain is confirmed
      - key: FRONTEND_URL
        value: https://ziva-bi-frontend.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Ziva BI <onboarding@resend.dev>"

      # ── Platform owner ───────────────────────────────────────────────────────
      # Set to the UUID of the Ziva BI owner account after first deploy + signup.
      - key: OWNER_USER_ID
        sync: false

      # ── Cloudflare R2 (reserved — not yet used in production) ───────────────
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

  - type: web
    name: ziva-bi-frontend
    runtime: docker
    rootDir: frontend
    region: oregon
    # The frontend is built via frontend/Dockerfile (multi-stage: deps → builder → runner).
    # NEXT_PUBLIC_API_URL is baked into the JS bundle in the builder stage via ENV —
    # it must be set there, not as a runtime env var, for Next.js to inline it.
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ziva-bi-backend.onrender.com

databases:
  - name: ziva-bi-db
    databaseName: ziva_bi
    user: ziva_bi_user
    plan: basic-256mb   # Render's new flexible plan (legacy "starter" is deprecated)
    diskSizeGB: 5       # Minimum paid storage — 5 GB × $0.30 = $1.50/mo; upgrade easily later
    region: oregon
