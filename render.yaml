services:
  - type: web
    name: ziva-bi-backend
    runtime: python
    rootDir: backend
    region: oregon
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ziva-bi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ALLOWED_ORIGINS
        value: https://ziva-bi-frontend.onrender.com
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

      # ── Supabase Storage (M6 — document attachments) ────────────────────────
      # Fill these in the Render dashboard after creating the Supabase project.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: documents

      # ── Email (P2 — fill in when Resend/SendGrid is wired up) ───────────────
      - key: FRONTEND_URL
        value: https://ziva-bi-frontend.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

      # ── Platform owner ───────────────────────────────────────────────────────
      # Set to the UUID of the Ziva BI owner account after first deploy + signup.
      - key: OWNER_USER_ID
        sync: false

      # ── Cloudflare R2 (reserved — not yet used in production) ───────────────
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

  - type: web
    name: ziva-bi-frontend
    runtime: node
    rootDir: frontend
    region: oregon
    # next.config.ts uses output:"standalone" — the build must copy static assets
    # into the standalone directory and the server is started via node, not npm start.
    buildCommand: >-
      npm ci && npm run build &&
      cp -r public .next/standalone/public &&
      cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ziva-bi-backend.onrender.com
      - key: NODE_VERSION
        value: "20.11.0"

databases:
  - name: ziva-bi-db
    databaseName: ziva_bi
    user: ziva_bi_user
    plan: basic-256mb   # Render's new flexible plan (legacy "starter" is deprecated)
    diskSizeGB: 5       # Minimum paid storage — 5 GB × $0.30 = $1.50/mo; upgrade easily later
    region: oregon
